<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>🌡️ Temperature Converter</h1>
        <p class="subtitle">Convert Temperature Between Celsius, Fahrenheit & Kelvin</p>

        <div class="input-box">

            <label for="temperature">Enter Temperature</label>
            <input
                type="number"
                id="temperature"
                placeholder="Enter temperature">

        </div>

        <div class="input-box">

            <label for="unit">Select Unit</label>

            <select id="unit">
                <option value="celsius">Celsius (°C)</option>
                <option value="fahrenheit">Fahrenheit (°F)</option>
                <option value="kelvin">Kelvin (K)</option>
            </select>

        </div>

        <button onclick="convertTemperature()">
            Convert
        </button>

        <p id="error" class="error"></p>

        <div class="result-box">

            <h2>Converted Values</h2>

            <p id="celsius">Celsius : -- °C</p>

            <p id="fahrenheit">Fahrenheit : -- °F</p>

            <p id="kelvin">Kelvin : -- K</p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
